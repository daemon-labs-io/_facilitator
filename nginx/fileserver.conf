user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /run/nginx.pid;

events {
    worker_connections  8192;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    
    # Proxy cache for frequently accessed files
    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=filecache:100m max_size=1g 
                     inactive=60m use_temp_path=off;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 200 302 60m;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    
    keepalive_timeout  30;
    keepalive_requests 1000;
    
    output_buffers 8 256k;
    postpone_output 0;
    
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    server {
        listen 80;
        server_name _;
        
        root /usr/share/nginx/html;
        
        location / {
            try_files $uri $uri/ =404;
            
            if ($request_method = 'GET') {
                add_header X-Accel-Buffering no;
            }
        }
        
        location ~* \.(bin|iso|img|dmg|tar|gz|bz2|zip|rar|7z)$ {
            expires max;
            add_header Cache-Control "public, immutable";
            add_header X-Accel-Buffering no;
            add_header X-Cache-Status $upstream_cache_status;
            access_log off;
            
            # Cache in tmpfs for concurrent access
            proxy_cache filecache;
            proxy_cache_bypass $http_cache_control;
            proxy_no_cache $http_pragma $http_authorization;
            proxy_cache_revalidate on;
            proxy_cache_min_uses 1;
            
            # Direct I/O for large files (bypass OS cache)
            directio 4m;
            directio_alignment 512;
            
            # Async I/O
            aio on;
            aio_write on;
            
            output_buffers 1 1m;
        }
        
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|txt)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}